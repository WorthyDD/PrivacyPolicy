<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!--  同 shell：把 sensor 类 feature 放开到 *，否则委托到 blob: 子 iframe 时被切。 -->
  <meta http-equiv="Permissions-Policy"
    content="accelerometer=*, gyroscope=*, magnetometer=*, camera=*, microphone=*, autoplay=*, fullscreen=*, clipboard-read=*, clipboard-write=*">
  <title>Game Frame</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
      touch-action: none
    }
  </style>
</head>

<body>
  <iframe id="content-frame"
    sandbox="allow-scripts allow-same-origin allow-popups allow-pointer-lock allow-modals allow-forms"
    allow="autoplay; camera; microphone; clipboard-read; clipboard-write; gyroscope; accelerometer; fullscreen"
    scrolling="no"></iframe>
  <script>
    var _gameUrl = '';
    var _requestedMuted = false;
    var _blobUrl = null;
    var _loadToken = 0;
    var _delayDomReadyForHairGuard = false;
    var _hairGuardReady = false;
    var _pendingHairGuardDomReady = null;
    var _lastRuntimeLifecycleType = null;
    var FRAME_VIBRATION_MAX_DURATION_MS = 60;
    var _frameVibrationGateOpen = true;

    // ─── perf trace (临时调试，验证完删除) ──────────────────────────────
    // 每次 loadGameContent 重置 base，单条 log 自带 Δ(上一阶段) + total(累计)
    // 输出到 console + 透传给父 shell（postMessage type=sekai_feed_frame_perf）
    // 让宿主侧也能聚合一份完整链路。
    var _perfBase = 0;
    var _perfLast = 0;
    function perfReset(tag, extra) {
      _perfBase = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
      _perfLast = _perfBase;
      perf(tag, extra);
    }
    function perf(tag, extra) {
      var now = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
      var d = (now - _perfLast).toFixed(0);
      var t = (now - _perfBase).toFixed(0);
      _perfLast = now;
      var line = '[GameFramePerf] ' + tag + ' Δ=' + d + 'ms total=' + t + 'ms token=' + _loadToken;
      if (extra) { try { line += ' ' + JSON.stringify(extra); } catch (_e) {} }
      try { console.log(line); } catch (_e) {}
      try {
        window.parent.postMessage({
          type: 'sekai_feed_frame_perf',
          scope: 'frame',
          tag: tag,
          delta_ms: Number(d),
          total_ms: Number(t),
          token: _loadToken,
          extra: extra || null,
        }, '*');
      } catch (_e) {}
    }
    // ────────────────────────────────────────────────────────────────────

    // 诊断日志：默认关。需排查时临时改为 true，会同时 console.log 并通过
    // postMessage 冒泡到外层 WebView 宿主（Flutter / devtools 都能看到）。
    var _dbgEnabled = false;
    function dbg(tag, payload) {
      if (!_dbgEnabled) return;
      try {
        var line = '[sekai-frame] ' + tag + (payload !== undefined ? ' ' + JSON.stringify(payload) : '');
        if (typeof console !== 'undefined' && console.log) console.log(line);
      } catch (_e) {}
      try {
        window.parent.postMessage({
          type: 'sekai_feed_frame_debug',
          scope: 'frame',
          tag: tag,
          payload: payload,
          t: Date.now(),
        }, '*');
      } catch (_e) {}
    }

    function clampVibrationDuration(duration) {
      var value = Number(duration);
      if (!isFinite(value) || value <= 0) return 15;
      return Math.min(Math.round(value), FRAME_VIBRATION_MAX_DURATION_MS);
    }

    function extractFrameVibrationDuration(sourceData) {
      if (sourceData && Array.isArray(sourceData.pattern)) {
        var maxDuration = 0;
        for (var i = 0; i < sourceData.pattern.length; i++) {
          maxDuration = Math.max(maxDuration, clampVibrationDuration(sourceData.pattern[i]));
        }
        if (maxDuration > 0) return maxDuration;
      }
      return clampVibrationDuration(sourceData && sourceData.duration);
    }

    function canForwardFrameVibration() {
      return _frameVibrationGateOpen && document.visibilityState !== 'hidden';
    }

    function normalizeFrameVibrationMessage(message) {
      if (!message || (message.action !== 'gen_vibration' && message.action !== 'vibrate')) {
        return null;
      }
      var sourceData = (message.data && typeof message.data === 'object') ? message.data : {};
      return {
        action: 'gen_vibration',
        data: {
          type: typeof sourceData.type === 'string' ? sourceData.type : 'light',
          duration: extractFrameVibrationDuration(sourceData),
          source: sourceData.source || 'frame_bridge',
        },
      };
    }

    function forwardFrameVibration(message) {
      if (!canForwardFrameVibration()) return false;
      var nextMessage = normalizeFrameVibrationMessage(message);
      if (!nextMessage) return false;
      postToParent(nextMessage);
      return true;
    }

    function clearFrameVibrationState() {
      try {
        if (navigator.vibrate) navigator.vibrate(0);
      } catch (_e) {}
    }

    function buildInjectedVibrationGovernorScript() {
      return [
        '(function(){',
        'if(window.__sekai_vibration_governor_installed)return;',
        'window.__sekai_vibration_governor_installed=true;',
        'var MAX_DURATION_MS=60;',
        'var gateOpen=true;',
        'var originalVibrate=typeof navigator!==\"undefined\"&&navigator.vibrate?navigator.vibrate.bind(navigator):null;',
        'function clampValue(value){var num=Number(value);if(!isFinite(num)||num<=0)return 0;return Math.min(Math.round(num),MAX_DURATION_MS);}',
        'function extractDuration(pattern){if(Array.isArray(pattern)){var maxDuration=0;for(var i=0;i<pattern.length;i++){maxDuration=Math.max(maxDuration,clampValue(pattern[i]));}return maxDuration;}return clampValue(pattern);}',
        'function stopOnly(){if(originalVibrate){try{originalVibrate(0);}catch(_){}}}',
        'function forward(pattern){if(!gateOpen)return false;var duration=extractDuration(pattern);if(duration<=0)return false;try{window.parent.postMessage({action:\"gen_vibration\",data:{type:\"light\",duration:duration,source:\"navigator_vibrate\"}},\"*\");return true;}catch(_){return false;}}',
        'function closeGate(){gateOpen=false;stopOnly();}',
        'function openGate(){gateOpen=true;}',
        'if(originalVibrate){navigator.vibrate=function(pattern){if(pattern===0)return stopOnly(),true;if(Array.isArray(pattern)){var hasPositive=false;for(var i=0;i<pattern.length;i++){if(clampValue(pattern[i])>0){hasPositive=true;break;}}if(!hasPositive)return stopOnly(),true;}return forward(pattern);};}',
        'window.__sekaiVibrationGovernor={stop:closeGate,resume:openGate,forward:forward};',
        'document.addEventListener(\"visibilitychange\",function(){if(document.visibilityState===\"hidden\")closeGate();});',
        'window.addEventListener(\"message\",function(ev){var data=ev.data;if(typeof data===\"string\"){try{data=JSON.parse(data);}catch(_){return;}}if(!data)return;if(data.type===\"sekai:cancel_vibration\")closeGate();if(data.type===\"sekai:resume_vibration\")openGate();});',
        '})();',
      ].join('');
    }

    function contentFrame() {
      return document.getElementById('content-frame');
    }

    function isRemoteUrl(url) {
      return /^https?:\/\//i.test(url || '');
    }

    function isAbsoluteLocalUrl(url) {
      return /^(file|blob|data):/i.test(url || '');
    }

    function resolveLocalUrl(url) {
      if (!url) return 'about:blank';
      if (isAbsoluteLocalUrl(url) || isRemoteUrl(url)) return url;
      if (url.indexOf('assets/') === 0) return '../' + url;
      return url;
    }

    function buildLocalClickCompatScriptTag() {
      // file:// 下 WKWebView 合成的 MouseEvent('click') 通过 dispatchEvent 不会
      // 触发元素的 onclick 属性处理程序（https:// 下正常）。游戏模板自带的
      // compat 把 addEventListener('click', fn) 改写成 pointerup，那条路径
      // 不受影响；但 <button onclick="..."> 这种内联 onclick 在 file:// 下失灵。
      // 这里在 HTML 字符串里 inline 一段脚本，pointerup capture 时顺着 DOM 向上
      // 找 onclick 属性并直接 .call() 调用，绕开 dispatchEvent 的黑洞。
      // 脚本作为 iframe 自身脚本运行，不依赖父 frame 跨域访问子 document。
      return [
        '<script data-sekai-local-click-compat="1">',
        '(function(){',
        'if(window.__sekai_local_click_compat_installed)return;',
        'window.__sekai_local_click_compat_installed=true;',
        'var TAP_SLOP=12;',
        'var DEDUPE_MS=600;',
        'var down=null;',
        // 记录最近一次 compat 兜底触发 onclick 的 target + 时间，用于去重
        // 个别设备上原生 click 仍能触达 onclick 属性 —— 避免双触发。
        'var lastCompatFire=null;',
        'function isPrimaryButton(e){return e.button===undefined||e.button===0;}',
        'function reset(pointerId){if(!down)return;if(pointerId!==undefined&&down.pointerId!==undefined&&pointerId!==down.pointerId)return;down=null;}',
        'function isTap(e){if(!down)return false;var dx=Math.abs((e.clientX||0)-down.x);var dy=Math.abs((e.clientY||0)-down.y);return dx<=TAP_SLOP&&dy<=TAP_SLOP;}',
        'function onclickInPath(node){while(node&&node!==document&&node!==window){if(typeof node.onclick===\'function\')return node;node=node.parentElement;}return null;}',
        'function buildCompatEvent(e){try{return new MouseEvent(\'click\',{bubbles:true,cancelable:true,view:e.view||window,detail:1,screenX:e.screenX||0,screenY:e.screenY||0,clientX:e.clientX||0,clientY:e.clientY||0,ctrlKey:!!e.ctrlKey,altKey:!!e.altKey,shiftKey:!!e.shiftKey,metaKey:!!e.metaKey,button:0,relatedTarget:null});}catch(_){return e;}}',
        'function callOnclickPath(node,e){var fired=0;while(node&&node!==document&&node!==window){if(typeof node.onclick===\'function\'){try{var r=node.onclick.call(node,e);fired++;if(r===false&&e&&e.preventDefault)e.preventDefault();}catch(_err){}if(e&&e.cancelBubble)break;}node=node.parentElement;}return fired;}',
        'window.addEventListener(\'pointerdown\',function(e){if(!isPrimaryButton(e))return;down={x:e.clientX||0,y:e.clientY||0,pointerId:e.pointerId,target:e.target};},true);',
        'window.addEventListener(\'pointercancel\',function(e){reset(e.pointerId);},true);',
        'window.addEventListener(\'pointerup\',function(e){if(!isPrimaryButton(e)||!down)return;if(down.pointerId!==undefined&&e.pointerId!==undefined&&down.pointerId!==e.pointerId)return;var target=e.target&&e.target.nodeType===1?e.target:down.target;var tap=isTap(e);var root=target?onclickInPath(target):null;down=null;if(!target||!tap||!root)return;var compatEvent=buildCompatEvent(e);setTimeout(function(){var fired=callOnclickPath(target,compatEvent);if(fired>0){lastCompatFire={root:root,t:Date.now()};}},0);},true);',
        // Dedupe: 若最近 compat 已触发过，吞掉原生 click 对同路径 onclick 的重复调用
        'window.addEventListener(\'click\',function(e){if(!lastCompatFire)return;if(Date.now()-lastCompatFire.t>DEDUPE_MS){lastCompatFire=null;return;}var n=e.target;while(n&&n!==document&&n!==window){if(n===lastCompatFire.root){lastCompatFire=null;e.stopImmediatePropagation();return;}n=n.parentElement;}},true);',
        '})();',
        '<\/script>',
      ].join('');
    }

    function injectLocalClickCompatInline(html) {
      // 这段脚本必须躲开 injectScripts() 里的双注入防护（SEKAI_SYNTHETIC_KEY
      // 等特征命中就整段 skip），所以独立 inline 一次。幂等靠脚本内的
      // __sekai_local_click_compat_installed 保证。
      if (!html) return html;
      if (html.indexOf('data-sekai-local-click-compat') !== -1) return html;
      var tag = buildLocalClickCompatScriptTag();
      var headMatch = html.match(/<head[^>]*>/i);
      if (headMatch) {
        var insertPos = (headMatch.index || 0) + headMatch[0].length;
        return html.slice(0, insertPos) + tag + html.slice(insertPos);
      }
      var htmlMatch = html.match(/<html[^>]*>/i);
      if (htmlMatch) {
        var htmlPos = (htmlMatch.index || 0) + htmlMatch[0].length;
        return html.slice(0, htmlPos) + '<head>' + tag + '</head>' + html.slice(htmlPos);
      }
      return tag + html;
    }

    function buildMissingLibraryCompatScriptTag() {
      return [
        '<script data-sekai-missing-library-compat="1">',
        '(function(){',
        'if(!window.lucide){window.lucide={createIcons:function(){}};}',
        '})();',
        '<\/script>',
      ].join('');
    }

    function injectMissingLibraryCompatInline(html) {
      if (!html) return html;
      if (html.indexOf('lucide') === -1) return html;
      if (html.indexOf('data-sekai-missing-library-compat') !== -1) return html;
      var tag = buildMissingLibraryCompatScriptTag();
      var headMatch = html.match(/<head[^>]*>/i);
      if (headMatch) {
        var insertPos = (headMatch.index || 0) + headMatch[0].length;
        return html.slice(0, insertPos) + tag + html.slice(insertPos);
      }
      var htmlMatch = html.match(/<html[^>]*>/i);
      if (htmlMatch) {
        var htmlPos = (htmlMatch.index || 0) + htmlMatch[0].length;
        return html.slice(0, htmlPos) + '<head>' + tag + '</head>' + html.slice(htmlPos);
      }
      return tag + html;
    }

    function buildIframeDiagnosticsScriptTag() {
      return [
        '<script data-sekai-iframe-diagnostics="1">',
        '(function(){',
        'if(window.__sekai_iframe_diag_installed)return;',
        'window.__sekai_iframe_diag_installed=true;',
        'function post(type,payload){try{window.parent.postMessage(Object.assign({type:type},payload||{}),\'*\');}catch(_){}}',
        'function now(){try{return window.performance&&performance.now?performance.now():Date.now();}catch(_){return Date.now();}}',
        'function safe(a){try{if(a===undefined)return\'undefined\';if(a===null)return\'null\';if(typeof a===\'string\')return a;if(typeof a===\'number\'||typeof a===\'boolean\')return String(a);if(a instanceof Error)return a.name+\': \'+a.message+(a.stack?\'\\n\'+a.stack:\'\');return JSON.stringify(a);}catch(_){return\'<unserializable>\';}}',
        'function hook(level){var orig=console[level];if(typeof orig!==\'function\')return;console[level]=function(){var args=[];for(var i=0;i<arguments.length;i++)args.push(safe(arguments[i]));post(\'sekai_iframe_console\',{level:level,line:args.join(\' \')});try{orig.apply(console,arguments);}catch(_){}};}',
        '[\'log\',\'info\',\'warn\',\'error\',\'debug\'].forEach(hook);',
        'function vp(){try{var de=document.documentElement,b=document.body,vv=window.visualViewport;return{ih:window.innerHeight,iw:window.innerWidth,deCH:de&&de.clientHeight,deCW:de&&de.clientWidth,boH:b&&b.offsetHeight,boW:b&&b.offsetWidth,sh:window.screen&&screen.height,sw:window.screen&&screen.width,vvH:vv&&vv.height,vvW:vv&&vv.width,rs:document.readyState};}catch(e){return{err:String(e)}}}',
        'function pp(tag,extra){post(\'sekai_iframe_perf_trace\',{tag:tag,ts:now(),extra:extra||null});}',
        'pp(\'diag:installed\',vp());',
        'document.addEventListener(\'readystatechange\',function(){pp(\'diag:readystate\',{state:document.readyState,vp:vp()});});',
        'window.addEventListener(\'message\',function(e){if(!(e.data&&e.data.type===\'viewport_height_change\'))return;var before=vp();setTimeout(function(){pp(\'diag:viewport_msg\',{h:e.data.height,before:before,after:vp()});},0);});',
        'window.addEventListener(\'DOMContentLoaded\',function(){pp(\'diag:DCL\',vp());try{var cs=document.querySelectorAll(\'canvas\');for(var i=0;i<cs.length;i++){var c=cs[i],r=c.getBoundingClientRect();pp(\'diag:canvas\',{i:i,id:c.id||\'\',cls:c.className||\'\',w:c.width,h:c.height,sw:Math.round(r.width),sh:Math.round(r.height),sl:Math.round(r.left),st:Math.round(r.top)});}pp(\'diag:DCL:scan\',{canvas:cs.length});}catch(e){pp(\'diag:canvas:error\',{err:String(e)});}});',
        'window.addEventListener(\'load\',function(){pp(\'diag:window.load\',vp());});',
        '})();',
        '<\/script>',
      ].join('');
    }

    function injectIframeDiagnosticsInline(html) {
      if (!html) return html;
      if (html.indexOf('data-sekai-iframe-diagnostics') !== -1) return html;
      var tag = buildIframeDiagnosticsScriptTag();
      var headMatch = html.match(/<head[^>]*>/i);
      if (headMatch) {
        var insertPos = (headMatch.index || 0) + headMatch[0].length;
        return html.slice(0, insertPos) + tag + html.slice(insertPos);
      }
      var htmlMatch = html.match(/<html[^>]*>/i);
      if (htmlMatch) {
        var htmlPos = (htmlMatch.index || 0) + htmlMatch[0].length;
        return html.slice(0, htmlPos) + '<head>' + tag + '</head>' + html.slice(htmlPos);
      }
      return tag + html;
    }

    function isHairCanvasGameHtml(html) {
      return html &&
        html.indexOf('id="game-canvas"') !== -1 &&
        html.indexOf('function initHair') !== -1 &&
        html.indexOf('function initApp') !== -1 &&
        html.indexOf('window.appState.hair') !== -1;
    }

    function buildHairCanvasInitGuardScriptTag() {
      return [
        '<script data-sekai-hair-init-guard="1">',
        '(function(){',
        'if(window.__sekai_hair_init_guard_installed)return;',
        'window.__sekai_hair_init_guard_installed=true;',
        'var hooked=false,ran=false;',
        'function post(tag,extra){try{window.parent.postMessage({type:\'sekai_iframe_perf_trace\',tag:tag,ts:(performance&&performance.now)?performance.now():Date.now(),extra:extra||null},\'*\');}catch(_){}}',
        'function dims(){var de=document.documentElement,b=document.body,c=document.getElementById(\'game-canvas\'),r=c&&c.getBoundingClientRect?c.getBoundingClientRect():null;return{iw:window.innerWidth||0,ih:window.innerHeight||0,deW:de&&de.clientWidth||0,deH:de&&de.clientHeight||0,boW:b&&b.offsetWidth||0,boH:b&&b.offsetHeight||0,cw:c&&c.width||0,ch:c&&c.height||0,crw:r&&Math.round(r.width)||0,crh:r&&Math.round(r.height)||0,rs:document.readyState};}',
        'function usable(d){d=d||dims();return d.iw>0&&d.ih>0&&d.deW>0&&d.deH>0;}',
        'function raf(fn){if(typeof requestAnimationFrame===\'function\')requestAnimationFrame(fn);else setTimeout(fn,16);}',
        'function waitStable(done){var tries=0,last=null;function step(){var d=dims();if(usable(d)&&last&&last.iw===d.iw&&last.ih===d.ih&&last.deW===d.deW&&last.deH===d.deH){post(\'hair_guard:ready\',{tries:tries,dims:d});done();return;}last=d;tries++;if(tries>120){post(\'hair_guard:timeout\',{tries:tries,dims:d});done();return;}raf(step);}raf(step);}',
        'var add=document.addEventListener;',
        'document.addEventListener=function(type,listener,options){',
          'if(type===\'DOMContentLoaded\'&&typeof listener===\'function\'&&listener.name===\'initApp\'){',
            'hooked=true;',
            'var wrapped=function(event){',
              'var d=dims();',
              'if(usable(d)){post(\'hair_guard:init_now\',{dims:d});ran=true;return listener.call(this,event);}',
              'post(\'hair_guard:init_deferred\',{dims:d});',
              'waitStable(function(){if(ran)return;ran=true;listener.call(document,event);});',
            '};',
            'return add.call(this,type,wrapped,options);',
          '}',
          'return add.call(this,type,listener,options);',
        '};',
        'add.call(document,\'DOMContentLoaded\',function(){',
          'post(\'hair_guard:DCL\',{hooked:hooked,ran:ran,dims:dims()});',
          'if(hooked)return;',
          'var d=dims();',
          'if(usable(d))return;',
          'waitStable(function(){if(typeof window.resize===\'function\')try{window.resize();}catch(_){}if(typeof window.initHair===\'function\')try{window.initHair();post(\'hair_guard:reinit\',{dims:dims()});}catch(e){post(\'hair_guard:reinit_error\',{err:String(e)});}});',
        '});',
        '})();',
        '<\/script>',
      ].join('');
    }

    function injectHairCanvasInitGuardInline(html) {
      if (!isHairCanvasGameHtml(html)) return html;
      if (html.indexOf('data-sekai-hair-init-guard') !== -1) return html;
      var tag = buildHairCanvasInitGuardScriptTag();
      var headMatch = html.match(/<head[^>]*>/i);
      if (headMatch) {
        var insertPos = (headMatch.index || 0) + headMatch[0].length;
        return html.slice(0, insertPos) + tag + html.slice(insertPos);
      }
      return tag + html;
    }

    function buildViewportBridgePreludeScriptTag() {
      // 与 buildInjectedScripts() 中的 viewport bridge 段语义对齐，但独立
      // inline、内置 __sekai_viewport_bridge_installed 守门，保证可与全量
      // 注入路径互斥共存：先到先得，第二份 return。
      // ── 临时附加 perf_trace（验证完删除）：在 prelude 末尾注册
      // PerformanceObserver(resource) + readystatechange + DCL/load 监听，
      // 把每个外部资源 url+duration 和 DOM 阶段切换时刻 postMessage 给父
      // shell，定位 viewport_ready → dom_ready 之间的具体瓶颈。
      return [
        '<script data-sekai-viewport-bridge="1">',
        '(function(){',
        'if(window.__sekai_viewport_bridge_installed)return;',
        'window.__sekai_viewport_bridge_installed=true;',
        'var vs=document.createElement(\'style\');vs.id=\'sekai-viewport-style\';',
        'function attach(){if(document.head&&!vs.parentNode)document.head.appendChild(vs);}',
        'attach();if(!vs.parentNode){document.addEventListener(\'DOMContentLoaded\',attach);}',
        'try{Object.defineProperty(window,\'innerHeight\',{get:function(){return document.documentElement.clientHeight},configurable:true})}catch(_){}',
        // cur 用 false 当"从未 apply 过"哨兵；shell 在键盘未弹时发的 height
        // 就是 null，若 cur 初始也是 null 则 first apply(null) 早返回，
        // html/body{height:100%!important} 永远写不进去，game DCL 时
        // documentElement.clientHeight 拿到 0/瞬态值 → 头发挤边。
        'var cur=false;',
        'function apply(h){',
          'if(h===cur)return;cur=h;attach();',
          'if(typeof h===\'number\'&&h>0){',
            'vs.textContent=\':root{--sekai-viewport-height:\'+h+\'px}html{height:\'+h+\'px!important;overflow:hidden!important}body{height:\'+h+\'px!important;overflow:hidden!important}#game-container{height:\'+h+\'px!important}\';',
          '}else{',
            'vs.textContent=\':root{--sekai-viewport-height:100%}html{height:100%!important;overflow:hidden!important}body{height:100%!important;overflow:hidden!important}\';',
          '}',

    function injectScripts(html, options) {
      var patchedHtml = patchLegacyAudioSession(html || '');
      // 双注入防护：上游 game export 模板如果已经内联了 Sekai 兼容脚本，
      // 这里就整体 skip。单独一行 <!-- sekai:online-scripts --> 锚太脆，
      // 追加两个独家特征做 OR 兜底：
      //   - SEKAI_SYNTHETIC_KEY 是模板里 click blocker 的常量，frame 注入版本不含
      //   - sekai_iframe_swipe_up 是模板里的 swipe 上滑 message type，frame 注入版本不含
      // 只要命中任一特征就说明模板已内联全套，不再注入第二份——否则 game 自带
      // 的 document click blocker 会被 frame 的 click→pointerup 改写改挂到
      // document pointerup capture 上，stopImmediatePropagation() 斩断整个
      // pointerup 事件流，造成按钮点不动 / 画笔松手停不下来。
      if (
        patchedHtml.indexOf('<!-- sekai:online-scripts -->') !== -1 ||
        patchedHtml.indexOf('SEKAI_SYNTHETIC_KEY') !== -1 ||
        patchedHtml.indexOf('sekai_iframe_swipe_up') !== -1
      ) {
        dbg('injectScripts:skip', {
          hasAnchor: patchedHtml.indexOf('<!-- sekai:online-scripts -->') !== -1,
          hasSyntheticKey: patchedHtml.indexOf('SEKAI_SYNTHETIC_KEY') !== -1,
          hasSwipeUp: patchedHtml.indexOf('sekai_iframe_swipe_up') !== -1,
          len: patchedHtml.length,
        });
        return patchedHtml;
      }
      dbg('injectScripts:injected', { len: patchedHtml.length });

      var injectedScripts = buildInjectedScripts(options && options.initialAudioMuted === true);
      var headMatch = patchedHtml.match(/<head[^>]*>/i);
      if (headMatch) {
        var insertPos = (headMatch.index || 0) + headMatch[0].length;
        return patchedHtml.slice(0, insertPos) + injectedScripts + patchedHtml.slice(insertPos);
      }

      var htmlMatch = patchedHtml.match(/<html[^>]*>/i);
      if (htmlMatch) {
        var htmlPos = (htmlMatch.index || 0) + htmlMatch[0].length;
        return patchedHtml.slice(0, htmlPos) + '<head>' + injectedScripts + '</head>' + patchedHtml.slice(htmlPos);
      }

      return injectedScripts + patchedHtml;
    }

    function setFrameSource(source) {
      var frame = contentFrame();
      if (!frame) return;
      dbg('setFrameSource', { source: source });
      perf('setFrameSource', { is_blob: /^blob:/i.test(String(source || '')) });
      frame.src = source || 'about:blank';
    }

    function xhrLoad(url) {
      return new Promise(function (resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url);
        xhr.onload = function () {
          resolve({
            ok: xhr.status >= 200 && xhr.status < 400,
            status: xhr.status,
            text: function () { return Promise.resolve(xhr.responseText); }
          });
        };
        xhr.onerror = function () { reject(new Error('XHR network error')); };
        xhr.send();
      });
    }

    function resetHairGuardReadyState(enabled) {
      _delayDomReadyForHairGuard = !!enabled;
      _hairGuardReady = !enabled;
      _pendingHairGuardDomReady = null;
    }

    function isUsableHairGuardDims(dims) {
      return !!dims && dims.iw > 0 && dims.ih > 0 && dims.deW > 0 && dims.deH > 0;
    }

    function markHairGuardReady(reason, extra) {
      if (!_delayDomReadyForHairGuard) return;
      _hairGuardReady = true;
      perf('child:hair_guard_ready', { reason: reason, extra: extra || null });
      if (_pendingHairGuardDomReady) {
        perf('child:dom_ready', { gated_by: 'hair_guard', reason: reason });
        postToParent(_pendingHairGuardDomReady);
        _pendingHairGuardDomReady = null;
      }
    }

    async function loadHtmlViaBlob(fetchUrl, token, options) {
      dbg('fetch:start', { fetchUrl: fetchUrl, token: token });
      perf('fetch:start', { remote: !!(options && options.remote) });
      var response = await xhrLoad(fetchUrl);
      dbg('fetch:response', { fetchUrl: fetchUrl, status: response.status, ok: response.ok });
      perf('fetch:response', { status: response.status });
      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }

      var fetchedHtml = await response.text();
      dbg('fetch:text', { len: fetchedHtml.length });
      perf('fetch:text', { bytes: fetchedHtml.length });
      if (token !== _loadToken) {
        dbg('fetch:stale', { token: token, current: _loadToken });
        return;
      }

      resetHairGuardReadyState(isHairCanvasGameHtml(fetchedHtml));
      var injectedHtml = injectBaseHrefInline(fetchedHtml, fetchUrl);
      injectedHtml = injectScripts(injectedHtml, {
        initialAudioMuted: _requestedMuted,
      });
      // iOS WKWebView 下，HTTPS 内容被 blob 化后 origin 变成 blob:file://，
      // 加上父 frame 的 mousedown preventDefault 去抖，原生 click 常常不再
      // 触达 <button onclick="..."> 的属性处理程序。compat 在 pointerup 直接
      // .onclick.call() 兜底，覆盖 remote 与 local 两条路径。幂等由脚本里
      // __sekai_local_click_compat_installed 保证。
      var before = injectedHtml.length;
      injectedHtml = injectLocalClickCompatInline(injectedHtml);
      injectedHtml = injectMissingLibraryCompatInline(injectedHtml);
      // viewport bridge prelude 必须最后注入：后插入的 inline script 会
      // 出现在 head 的最前位置，保证在 game 自己的任何 <script> 之前执行，
      // game 脚本读到的 window.innerHeight 才是 documentElement.clientHeight
      // 而不是 iOS 切换瞬态下的脏值。
      injectedHtml = injectViewportBridgePreludeInline(injectedHtml);
      injectedHtml = injectRuntimeLifecyclePreludeInline(injectedHtml);
      injectedHtml = injectMiniAppInteractionInline(injectedHtml);
      // This game initializes hair geometry at DOMContentLoaded. If WebKit has
      // not laid out the blob iframe yet, initApp sees a 0x0 viewport and keeps
      // bad hair coordinates until the user taps reset. Guard only matching
      // hair-canvas exports and defer initApp until the viewport is usable.
      injectedHtml = injectHairCanvasInitGuardInline(injectedHtml);
      // 独立诊断脚本不与 viewport bridge 互斥：全量注入路径已经带
      // sekai-viewport-style 时，上面的 prelude 会跳过，但我们仍需要跨源
      // console 和 DCL/canvas/viewport dump。
      injectedHtml = injectIframeDiagnosticsInline(injectedHtml);
      dbg('inlineClickCompat', {
        remote: !!(options && options.remote),
        delta: injectedHtml.length - before,
        hasTag: injectedHtml.indexOf('data-sekai-local-click-compat') !== -1,
        hasViewportBridge: injectedHtml.indexOf('data-sekai-viewport-bridge') !== -1,
      });
      perf('inject:done', { final_bytes: injectedHtml.length });
      var blob = new Blob([injectedHtml], { type: 'text/html' });
      revokeBlobUrl();
      _blobUrl = URL.createObjectURL(blob);
      dbg('blob:set', { blobUrl: _blobUrl, finalLen: injectedHtml.length });
      perf('blob:set', null);
      setFrameSource(_blobUrl);
    }

    async function loadGameContent(url) {
      var token = ++_loadToken;
      clearFrameVibrationState();
      // ENG-583: 不在 fetch 前 revoke 旧 blob——content-frame 仍指向它，提前 revoke 会闪黑。
      resetHairGuardReadyState(false);
      dbg('loadGameContent', { url: url, token: token });
      perfReset('loadGameContent', { url_tail: String(url || '').slice(-60) });

      if (!url) {
        setFrameSource('about:blank');
        return;
      }

      var remote = isRemoteUrl(url);
      var isBlobOrData = /^(blob|data):/i.test(url);
      dbg('loadGameContent:branch', { remote: remote, isBlobOrData: isBlobOrData, url: url });
      // 本地（file:// 或相对路径）也走 fetch+blob，与 remote 统一流水线。好处:
      //  1. click compat 脚本作为 inline <script> 内联到 HTML 字符串，是
      //     iframe 自身脚本，绕开父 frame 跨 file:// origin 访问子 document
      //     失败的黑洞（WKWebView 下 childWindow.document 访问常抛 Security
      //     Error 被静默吞掉，导致外部注入形同虚设）。
      //  2. blob URL 由父 frame 创建，origin 随父，iframe sandbox 行为更稳定。
      //  3. 只有一条代码路径，消除 local vs remote 的特殊情况。
      // blob/data: 已经是就绪内容，不走 fetch，直接交给 setFrameSource。
      if (isBlobOrData) {
        setFrameSource(url);
        return;
      }

      var fetchUrl = remote ? url : resolveFetchableLocalUrl(url);
      try {
        await loadHtmlViaBlob(fetchUrl, token, { remote: remote });
      } catch (error) {
        dbg('fetch:error', {
          remote: remote,
          fetchUrl: fetchUrl,
          message: error && error.message ? String(error.message) : String(error),
          name: error && error.name ? error.name : '',
        });
        if (token !== _loadToken) return;
        // 本地 fetch 失败（比如 WKWebView 没打开 allowFileAccessFromFileURLs）
        // 回退到直链 file://，至少把游戏显示出来；click compat 这轮就只能靠
        // 游戏模板自带逻辑了。
        if (!remote) {
          dbg('fetch:fallback-direct', { url: url });
          setFrameSource(resolveLocalUrl(url));
          return;
        }
        setFrameSource('about:blank');
        postToParent({
          type: 'sekai_iframe_js_error',
          message: error && error.message ? error.message : 'load_remote_html_failed',
          source: 'g3_feed_game_frame',
          lineno: 0,
          colno: 0,
          errorName: error && error.name ? error.name : 'GameFrameLoadError',
          errorStack: error && error.stack ? error.stack : '',
        });
      }
    }

    function bootstrap(payload) {
      payload = payload || {};
      var nextUrl = payload.gameUrl || '';
      var urlChanged = nextUrl !== _gameUrl;
      dbg('bootstrap', { nextUrl: nextUrl, prevUrl: _gameUrl, urlChanged: urlChanged, muted: !!payload.isMuted });

      _gameUrl = nextUrl;
      _requestedMuted = !!payload.isMuted;

      if (!urlChanged) {
        // shell postBootstrapToFrame 同 URL 重发时：不 reload，只 forward viewport/resize。
        postToChild({
          type: 'viewport_height_change',
          height: null,
        });
        return;
      }

      loadGameContent(_gameUrl);
    }

    window.addEventListener('message', function (event) {
      var data = event.data;
      if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch (_e) { }
      }

      if (data && data.type === 'sekai:camera_parent_response') {
        var _pf = contentFrame();
        if (_pf && _pf.contentWindow) {
          try {
            _pf.contentWindow.postMessage({
              type: 'sekai:camera_response',
              id: data.id,
              ok: !!data.ok,
              stream: data.stream || null,
              errorName: data.errorName || null,
              errorMessage: data.errorMessage || null,
            }, '*');
          } catch (_e) {}
        }
        return;
      }

      if (data && data.type === 'sekai:camera_request') {
        var _frame = contentFrame();
        if (!_frame || !_frame.contentWindow) return;
        var _reqId = data.id;
        var _constraints = data.constraints || { video: true };
        var _deliver = function(ok, stream, errName, errMsg) {
          try {
            _frame.contentWindow.postMessage({
              type: 'sekai:camera_response',
              id: _reqId,
              ok: !!ok,
              stream: stream || null,
              errorName: errName || null,
              errorMessage: errMsg || null,
            }, '*');
          } catch (_e) {}
        };
        var _askShell = function(reasonName, reasonMsg) {
          perf('camera:request:shell_fallback', { reason: reasonName || '', message: reasonMsg || '' });
          try {
            window.parent.postMessage({
              type: 'sekai:camera_parent_request',
              id: _reqId,
              constraints: _constraints,
            }, '*');
          } catch (_e) {
            _deliver(false, null, reasonName || 'NotAllowedError', reasonMsg || 'Permission denied');
          }
        };
        perf('camera:request:game_frame', { hasMediaDevices: !!navigator.mediaDevices });
        if (navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function') {
          navigator.mediaDevices.getUserMedia(_constraints).then(function(stream) {
            perf('camera:success:game_frame', null);
            _deliver(true, stream, null, null);
          }).catch(function(err) {
            perf('camera:error:game_frame', { name: (err && err.name) || '', message: (err && err.message) || '' });
            _askShell((err && err.name) || 'NotAllowedError', (err && err.message) || 'Permission denied');
          });
        } else {
          _askShell('NotSupportedError', 'mediaDevices not available');
        }
        return;
      }

      var frame = contentFrame();

      if (frame && event.source === frame.contentWindow) {
        if (data && (data.action === 'gen_vibration' || data.action === 'vibrate')) {
          forwardFrameVibration(data);
          return;
        }
        if (data && data.type === 'sekai_iframe_dom_ready') {
          if (_delayDomReadyForHairGuard && !_hairGuardReady) {
            _pendingHairGuardDomReady = data;
            perf('child:dom_ready:pending_hair_guard', null);
            return;
          }
          perf('child:dom_ready', null);
        } else if (data && data.type === 'viewport_ready') {
          perf('child:viewport_ready', null);
        } else if (data && data.type === 'sekai_iframe_perf_trace') {
          perf('child:trace:' + data.tag, data.extra);
          if (data.tag === 'hair_guard:init_now') {
            postToParent(data);
            markHairGuardReady('init_now', data.extra);
            return;
          } else if (
            data.tag === 'hair_guard:ready' ||
            data.tag === 'hair_guard:timeout' ||
            data.tag === 'hair_guard:reinit'
          ) {
            postToParent(data);
            markHairGuardReady(data.tag.replace('hair_guard:', ''), data.extra);
            return;
          } else if (
            data.tag === 'hair_guard:DCL' &&
            data.extra &&
            data.extra.hooked === false &&
            isUsableHairGuardDims(data.extra.dims)
          ) {
            postToParent(data);
            markHairGuardReady('dcl_usable_without_hook', data.extra);
            return;
          }
        }
        postToParent(data);
        return;
      }

      if (!data) return;

      if (data.type === 'sekai_feed_frame_bootstrap') {
        bootstrap(data.payload || {});
        return;
      }

      if (data.type === 'sekai:cancel_vibration') {
        stopFrameVibration();
        postToChild(data);
        return;
      }

      if (data.type === 'sekai:resume_vibration') {
        resumeFrameVibration();
        postToChild(data);
        return;
      }

      if (data.type === 'sekai:freeze' || data.type === 'sekai:thaw') {
        _lastRuntimeLifecycleType = data.type;
      }

      // 屏幕尺寸变化（全屏 / 旋转）→ reload content iframe。
      // 游戏在新 viewport 从零初始化，彻底规避 canvas pR / 坐标 / resize 时序。
      // 键盘弹出/收起：shell 传 height:number，不更新基准、不触发 reload。
      // ENG-583: 仅宽度变化触发 reload。Feed 滑卡/布局抖动常只有高度微变，
      // 原先 height>50px 会误触 reload（日志里虽少见，保守去掉 height-only 路径）。
      if (data.type === 'viewport_height_change') {
        var _dE = document.documentElement;
        var _curW = _dE ? _dE.clientWidth : 0;
        var _curH = _dE ? _dE.clientHeight : 0;
        if (typeof window._sekaiBaseVpW === 'undefined') { window._sekaiBaseVpW = _curW; window._sekaiBaseVpH = _curH; }
        if (data.height === null || data.height === undefined) {
          var _wChanged = _curW !== window._sekaiBaseVpW;
          if (_wChanged && _gameUrl) {
            dbg('viewport:reload', { prevW: window._sekaiBaseVpW, prevH: window._sekaiBaseVpH, curW: _curW, curH: _curH });
            window._sekaiBaseVpW = _curW;
            window._sekaiBaseVpH = _curH;
            loadGameContent(_gameUrl);
            return;
          }
          window._sekaiBaseVpW = _curW;
          window._sekaiBaseVpH = _curH;
        }
      }

      postToChild(data);
    });

    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'hidden') {
        stopFrameVibration();
      }
    });

    (function() {
      var frame = contentFrame();
      if (!frame) return;
      frame.addEventListener('load', function() {
        var childHref = '';
        try { childHref = frame.contentWindow && frame.contentWindow.location && frame.contentWindow.location.href; } catch (e) { childHref = '<blocked:' + (e && e.name) + '>'; }
        var hasInstalled = '';
        try { hasInstalled = String(!!(frame.contentWindow && frame.contentWindow.__sekai_local_click_compat_installed)); } catch (e) { hasInstalled = '<blocked>'; }
        dbg('iframe:load', { src: frame.src, childHref: childHref, compatInstalled: hasInstalled });
        perf('iframe:load', { is_blob: /^blob:/i.test(String(frame.src || '')) });
        replayRuntimeLifecycleToChild('iframe_load');
        // Relay window.load as fallback for shell's dom_ready detection.
        // Fires after ALL resources (including CDN scripts) finish loading;
        // shell guards with _iframeLoaded so duplicate fires are safe.
        postToParent({ type: 'sekai_iframe_load_fallback' });
      });
      frame.addEventListener('error', function(e) {
        dbg('iframe:error', { src: frame.src, message: e && e.message });
      });
    })();

    window.addEventListener('beforeunload', revokeBlobUrl);

    (function () {
      var frame = contentFrame();
      if (!frame) return;
      frame.addEventListener('error', function () {
        postToParent({
          type: 'sekai_iframe_js_error',
          message: 'content_frame_load_failed',
          source: 'g3_feed_game_frame',
          lineno: 0,
          colno: 0,
          errorName: 'ContentFrameLoadError',
          errorStack: '',
        });
      });
    })();
  </script>
