      // 转给 Dart 做 bsd_js_cap_exceeded 埋点 + 后续可能的 hardKill 决策。
      if (data.type === 'sekai:js_cap_exceeded') {
        try {
          sendFlutterMessage({
            action: 'jsCapExceeded',
            data: {
              cat: data.cat || '',
              attempted_bytes: data.attempted || 0,
              used_bytes: data.used || 0,
              cap_bytes: data.cap || 0,
              game_id: (GAME && GAME.game_id) || '',
            },
          });
        } catch (_e) {}
        return;
      }

      if (data.type === 'sekai_iframe_perf_trace') {
        // 来自子帧 prelude 的 PerformanceObserver / readystatechange / DOM
        // 阶段事件，透传到 console，定位 viewport_ready → dom_ready 之间的
        // 具体瓶颈（外部 CDN、大资源、长 inline script 等）。
        try {
          var line = '[ShellPerf] child:' + data.tag + ' childTs=' + Math.round(data.ts || 0) + 'ms gameId=' + (GAME && GAME.game_id || '?');
          if (data.extra) line += ' ' + JSON.stringify(data.extra);
          console.log(line);
        } catch (_e) {}
        return;
      }

      if (data.type === 'sekai_iframe_console') {
        // game iframe (blob:null 跨源) 的 console.* 经 prelude 主动 forward 上来。
        // 这里再 console.log 一次，让 InAppWebView 的 onConsoleMessage 抓得到。
        try {
          var clvl = String(data.level || 'log').toLowerCase();
          var line = String(data.line || '');
          var fn = (console[clvl] && typeof console[clvl] === 'function') ? console[clvl] : console.log;
          fn.call(console, '[GameInside ' + clvl + '] gameId=' + (GAME && GAME.game_id || '?') + ' | ' + line);
          forwardImportantConsoleLog(clvl, line);
        } catch (_e) {}
        return;
      }

      if (data.type === 'sekai_iframe_js_error') {
        var jf = iframeNode();
        if (!jf || event.source !== jf.contentWindow) return;
        hideLoading();
        // js_error 同时上报两条：既保留原有的 g3_feed_iframe_js_error 埋点，
        // 又把累计到 perf session 里（content 行的 js_error_count 字段）。
        reportPerfEvent('js_error', {
          message: data.message || '',
          source: data.source || '',
          errorName: data.errorName || '',
          lineno: data.lineno || 0,
          colno: data.colno || 0,
        });
        // 'g3_feed_game_frame' 来源代表 HTML 拉取/iframe 本身失败，视作 fetch_failed，
        // 与 v1 onFeedPerfFetchFailed 对齐。通知 Flutter loading 结束。
        if (data.source === 'g3_feed_game_frame') {
          clearDomReadyTimeout();
          reportPerfEvent('fetch_failed', null);
          var reason = data.errorName || data.message || 'game_frame_error';
          reportIframeLoadState('error', reason, { message: data.message || '', errorName: data.errorName || '' });
        }
        sendFlutterMessage({
          action: 'logEvent',
          parameters: {
            eventName: 'g3_feed_iframe_js_error',
            offline: true,
            web: true,
            gameId: GAME.game_id || '',
            message: data.message || '',
            source: data.source || '',
            errorName: data.errorName || '',
            container: 'newFeed',
          },
        });
        return;
      }

      // Feed perf 资源汇总（iframe 内 PerformanceObserver 注入脚本发出）。
      if (data.type === 'sekai_iframe_perf_resources') {
        reportPerfEvent('resources', data.payload || null);
        return;
      }

      if (data.type === 'sekai_iframe_perf_resource_details') {
        reportPerfEvent('resource_details', data.payload || null);
        return;
      }

      if (data.type === 'sekai:mini_app_interacted') {
        var interactionFrame = iframeNode();
        if (!interactionFrame || event.source !== interactionFrame.contentWindow) return;
        notifyNativeFeedMiniAppInteracted();
        return;
      }

      // Feed perf 真实可闻性边沿（iframe 内 media audibility observer 发出）。
      if (data.type === 'sekai_iframe_audio_playing_started') {
        reportPerfEvent('audio_started', {
          event_ts_ms: typeof data.timestamp === 'number' ? data.timestamp : Date.now(),
        });
        return;
      }
      if (data.type === 'sekai_iframe_audio_playing_stopped') {
        reportPerfEvent('audio_stopped', {
          event_ts_ms: typeof data.timestamp === 'number' ? data.timestamp : Date.now(),
        });
        return;
      }

      // Motion-on-demand：游戏注册/注销 devicemotion/orientation 监听时，
      // content-frame → game_frame → shell 接到此消息，转发给 Flutter 按需
      // 启停 60Hz motion bridge（sensors_plus + evaluateJavascript）。
      if (data.type === 'sekai:motion-needed') {
        sendFlutterMessage({
          action: 'motionNeeded',
          data: { needed: !!data.needed }
        });
        return;
      }

      if (data.origin !== 'sekai_gaming_iframe_api') return;
      var iframe = iframeNode();

      function reply(taskId, type, payload, errCode, errMsg) {
        if (!iframe || !iframe.contentWindow) return;
        var msg = {
          origin: 'sekai_gaming_iframe_api',
          type: type,
          taskId: taskId,
        };
        if (errCode) {
          msg.data = null;
          msg.error = { code: errCode, message: errMsg || 'Error' };
        } else {
          msg.data = payload !== undefined ? payload : null;
        }
        iframe.contentWindow.postMessage(msg, '*');
      }

      switch (data.type) {
        case 'sekai_iframe_dom_ready':
          if (!iframe || event.source !== iframe.contentWindow) return;
          _iframeLoaded = true;
          console.log('[NativeFeedShell] iframeDomReady gameId=' + (GAME.game_id || ''));
          shellPerf('iframe_dom_ready', null);
          clearDomReadyTimeout();
          hideLoading();
          reportIframeLoadState('complete');
          // dom_ready 用于 content 行 status='success' 收口，与 html_ready 一起算 visible_to_dom_ready_ms。
          reportPerfEvent('dom_ready', null);
          reportFirstIframeLoadSuccess();
          syncAudioStateForce('iframe_dom_ready');
          sendViewportHeight();
          // 预加载（不可见）时刚加载完的游戏要立刻冻结：之前的 freeze 发给的是
          // 旧内容，游戏 prelude 此刻才就绪，需重发一次 sekai:freeze 暂停 rAF。
          // 可见卡则发 thaw（已在跑，幂等无害）。
          applyIframeVisibility();
          break;

        // Fallback: game_frame relays this when its inner iframe fires window.load.
        // Catches CDN-heavy games where DOMContentLoaded is delayed beyond the fast-path
        // postMessage but the full load eventually completes.
        case 'sekai_iframe_load_fallback':
          if (!_iframeLoaded) {
            _iframeLoaded = true;
            console.log('[NativeFeedShell] iframeLoadFallback gameId=' + (GAME.game_id || ''));
            shellPerf('iframe_load_fallback', null);
            clearDomReadyTimeout();
            hideLoading();
            reportIframeLoadState('complete');
            reportPerfEvent('dom_ready', null);
            reportFirstIframeLoadSuccess();
            syncAudioStateForce('iframe_load_fallback');
            sendViewportHeight();
            // 同 dom_ready：预加载完成后若不可见则立刻冻结。
            applyIframeVisibility();
          }
          break;

        case 'get_app_states':
        case 'get_game_states': {
          var statesRsp = data.type === 'get_game_states' ? 'receive_game_states' : 'receive_app_states';
          var statesSessionCode = data.sessionCode;
          var statesParams = { gameId: GAME.game_id, versionId: GAME.version_id };
          if (statesSessionCode) statesParams.sessionCode = statesSessionCode;
          callApiGet('/game/game-states', statesParams)
            .then(function (r) {
              if (r.status === 404) { reply(data.taskId, statesRsp, null, 400, 'No saved state found'); return null; }
              return r.json();
            })
            .then(function (result) {
              if (!result) return;
              var states = extractData(result);
              if (!states) { reply(data.taskId, statesRsp, null, 400, 'No saved state found'); return; }
              var msg = { origin: 'sekai_gaming_iframe_api', type: statesRsp, taskId: data.taskId, data: states };
              if (statesSessionCode) msg.sessionCode = statesSessionCode;
              if (iframe && iframe.contentWindow) iframe.contentWindow.postMessage(msg, '*');
            })
            .catch(function () { reply(data.taskId, statesRsp, null, 500, 'Failed to load app states'); });
          break;
        }

        case 'save_app_states':
        case 'save_game_states': {
          var saveStatesData = data.data;
          if (!saveStatesData || typeof saveStatesData !== 'object') break;
          var saveStatesBody = {
            pageSettings: saveStatesData.pageSettings,
            gameId: GAME.game_id,
            versionId: GAME.version_id,
          };
          callApi('/game/game-states', saveStatesBody).catch(function () { });
          break;
        }

        case 'get_app_result':
        case 'get_game_result': {
          var resultRsp = data.type === 'get_game_result' ? 'receive_game_result' : 'receive_app_result';
          callApiGet('/game/result', { gameId: GAME.game_id, versionId: GAME.version_id })
            .then(function (r) { return r.json(); })
            .then(function (result) { reply(data.taskId, resultRsp, extractData(result)); })
            .catch(function () { reply(data.taskId, resultRsp, null, 500, 'Failed to get app result'); });
          break;
        }

        case 'save_app_result':
        case 'save_game_result': {
          var saveResultBody = Object.assign({ gameId: GAME.game_id, versionId: GAME.version_id }, data.data || {});
          callApi('/game/result', saveResultBody).catch(function () { });
          break;
        }

        case 'get_app_top_results':
        case 'get_game_top_results': {
          var topRsp = data.type === 'get_game_top_results' ? 'receive_game_top_results' : 'receive_app_top_results';
          var topPage = (data.data && data.data.page) ? Math.max(1, data.data.page) : 1;
          var topPageSize = Math.min(100, Math.max(1, (data.data && data.data.pageSize) ? data.data.pageSize : 50));
          callApiGet('/game/top-results', {
            gameId: GAME.game_id,
            versionId: GAME.version_id,
            page: topPage,
            page_size: topPageSize,
          })
            .then(function (r) { return r.json(); })
            .then(function (result) {
              var payload = extractData(result);
              var items = (payload && payload.items) ? payload.items : (Array.isArray(payload) ? payload : []);
              items.items = items;
              reply(data.taskId, topRsp, items);
            })
            .catch(function () { reply(data.taskId, topRsp, []); });
          break;
        }

        case 'call_llm':
        case 'gen_text': {
          var genTextRsp = data.type === 'call_llm' ? 'receive_call_llm' : 'receive_gen_text';
          var gtd = data.data || {};
          if (!gtd.systemPrompt || !gtd.userPrompt) {
            reply(data.taskId, genTextRsp, null, 400, 'Missing systemPrompt or userPrompt');
            break;
          }
          var schema = gtd.responseSchema;
          if (!schema || typeof schema !== 'object' || !Object.keys(schema).length) {
            reply(data.taskId, genTextRsp, null, 400, 'Invalid response schema');
            break;
          }
          var genTextBody = {
            messages: [
              { role: 'system', content: gtd.systemPrompt },
              { role: 'user', content: gtd.userPrompt },
            ],
            responseSchema: schema,
            gameId: GAME.game_id,
            versionId: GAME.version_id,
          };
          if (gtd.imageUrl) genTextBody.imageUrl = gtd.imageUrl;
          callApi('/game/gen-text', genTextBody)
            .then(function (r) { return r.json(); })
            .then(function (result) { reply(data.taskId, genTextRsp, extractData(result)); })
            .catch(function (err) { reply(data.taskId, genTextRsp, null, 500, (err && err.message) || 'LLM API call failed'); });
          break;
        }

        case 'gen_image': {
          var gid = data.data || {};
          if (!gid.prompt || typeof gid.prompt !== 'string') {
            reply(data.taskId, 'receive_gen_image', null, 400, 'Missing or invalid prompt');
            break;
          }
          var genImageBody = { userPrompt: gid.prompt, gameId: GAME.game_id, versionId: GAME.version_id };
          if (gid.imageUrl) genImageBody.imageUrl = gid.imageUrl;
          if (gid.aspectRatio) genImageBody.aspectRatio = gid.aspectRatio;
          if (gid.cutout !== undefined) genImageBody.cutout = gid.cutout;
          callApi('/game/gen-image', genImageBody)
            .then(function (r) { return r.json(); })
            .then(function (result) { reply(data.taskId, 'receive_gen_image', extractData(result)); })
            .catch(function (err) {
              var code = (err && err.status) || 500;
              reply(
                data.taskId,
                'receive_gen_image',
                null,
                code,
                code === 429 ? 'Daily image generation limit reached' : 'Image generation failed'
              );
            });
          break;
        }

        case 'gen_voice': {
          var gvd = data.data || {};
          if (!gvd.text || !gvd.voiceId) {
            reply(data.taskId, 'receive_gen_voice', null, 400, 'Missing text or voiceId');
            break;
          }
          callApiBlob('/audio/gen-audio', { text: gvd.text, voiceId: String(gvd.voiceId) })
            .then(function (blob) {
              return new Promise(function (resolve, reject) {
                var reader = new FileReader();
                reader.onloadend = function () { resolve(reader.result); };
                reader.onerror = reject;
                reader.readAsDataURL(blob);
              });
            })
            .then(function (audioBase64) { reply(data.taskId, 'receive_gen_voice', { audioBase64: audioBase64 }); })
            .catch(function () { reply(data.taskId, 'receive_gen_voice', null, 500, 'Voice generation failed'); });
          break;
        }

        case 'gen_transcript': {
          var gtrData = data.data || {};
          var audio = gtrData.audio;
          if (!audio || typeof audio !== 'string' || audio.indexOf('data:audio/') !== 0) {
            reply(data.taskId, 'receive_gen_transcript', null, 400, 'Missing or invalid audio data');
            break;
          }
          uploadBase64ToS3(audio, 'audio')
            .then(function (hostUrl) {
              return callApi('/game/gen-transcript', {
                audioUrl: hostUrl,
                initialPrompt: gtrData.initialPrompt || '',
              });
            })
            .then(function (r) { return r.json(); })
            .then(function (result) { reply(data.taskId, 'receive_gen_transcript', extractData(result)); })
            .catch(function () { reply(data.taskId, 'receive_gen_transcript', null, 500, 'Transcription failed'); });
          break;
        }

        case 'get_social_summary': {
          Promise.all([
            callApiGet('/game/likers', { game_id: GAME.game_id, page: 1, page_size: 20 }).then(function (r) { return r.json(); }).catch(function () { return null; }),
            callApiGet('/game/commenters', { game_id: GAME.game_id, page: 1, page_size: 20 }).then(function (r) { return r.json(); }).catch(function () { return null; }),
          ]).then(function (results) {
            var likers = (results[0] && results[0].data && results[0].data.items) || (results[0] && results[0].items) || [];
            var commenters = (results[1] && results[1].data && results[1].data.items) || (results[1] && results[1].items) || [];
            reply(data.taskId, 'receive_social_summary', {
              likes: _likeCount,
              comments: _commentCount,
              isLiked: _isLiked,
              likers: likers,
              commenters: commenters,
            });
          });
          break;
        }

        case 'get_player_info': {
          if (!_authToken || _isTourist || !_userId) { reply(data.taskId, 'receive_player_info', null); break; }
          callApiGet('/user/v2/getUserInfo', { userId: _userId })
            .then(function (r) { return r.json(); })
            .then(function (result) {
              var user = result && result.data && result.data.user;
              if (!user) { reply(data.taskId, 'receive_player_info', null); return; }
              reply(data.taskId, 'receive_player_info', {
                userId: String(user.userId),
                username: user.userName,
                avatar: user.avatarUrl,
                countryCode: user.countryCode || 'US',
                isCreator: !!(user.userId && String(user.userId) === String(GAME.creator_user_id)),
              });
            })
            .catch(function () { reply(data.taskId, 'receive_player_info', null); });
          break;
        }

        case 'invoke_select_characters':
          reply(data.taskId, 'receive_select_characters', null, 400, 'Character selection not supported');
          break;

        case 'invoke_share': {
          var shareData = data.data || {};
          var shareLink = buildShareLink();
          if (shareData.appStates) {
            try { shareLink += '&appStates=' + encodeURIComponent(btoa(JSON.stringify(shareData.appStates))); } catch (_e) { }
          }
          var payloadGameType = shareData.multiplayerShare ? 'multiplayer' : (GAME.type || GAME.game_type || '');
          var payloadCreatorName = GAME.creator_name || GAME.creatorUsername || '';
          var payloadCreateName = buildSharePanelCreateName(payloadGameType, payloadCreatorName);
          var payload = {
            title: buildSharePanelTitle(payloadGameType, shareData.title || 'Share to'),
            bottomTitle: GAME.title || '',
            contentType: 'g3_game',
            contentId: GAME.game_id,
            fromPage: 'feed',
            link: shareLink,
            needWatermark: false,
            type: 'share_only',
            gameType: payloadGameType,
            extra: {
              creatorId: GAME.creator_user_id,
              creatorName: payloadCreatorName,
              creatorAvatarUrl: GAME.creator_avatar || GAME.creatorAvatar || '',
              title: GAME.title || '',
              shareContent: buildShareContent(),
            },
          };
          if (payloadCreateName) {
            payload.extra.createName = payloadCreateName;
          }
          if (shareData.multiplayerShare) {
            payload.multiplayerShare = shareData.multiplayerShare;
          }
          if (shareData.coverImageBase64) {
            payload.imageB64 = shareData.coverImageBase64;
          } else if (
            shareData.coverImgUrl &&
            typeof shareData.coverImgUrl === 'string' &&
            shareData.coverImgUrl.indexOf('sekai-local://') === 0
          ) {
            var cacheKey = shareData.coverImgUrl.replace('sekai-local://', '');
            payload.imageB64 = _uploadCache[cacheKey] || null;
            if (!payload.imageB64) payload.imageUrl = GAME.cover;
          } else {
            payload.imageUrl = shareData.coverImgUrl || GAME.cover;
          }
          payload.other_actions = [
            { name: 'Full Screen', icon: 'https://public-access.sekai.chat/icon/universe/icon_share_fullscreen2.png', action: 'g3FullScreen' },
            { name: 'Download', icon: 'https://public-access.sekai.chat/icon/universe/icon_share_download2.png', action: 'g3Download' },
            { name: 'Feedback', icon: 'https://public-access.sekai.chat/icon/universe/icon_share_feedback2.png', action: 'g3Feedback' },
          ];
          sendFlutterMessage({ action: 'showSharePanel', arguments: payload });
          break;
        }

        case 'invoke_social': {
          var socialData = data.data || {};
          var action = socialData.action;
          if (!action) {
            reply(data.taskId, 'receive_social_action_result', { action: action, success: false });
            break;
          }
          if (action === 'like' || action === 'unlike') {
            _isLiked = action === 'like';
            _likeCount += _isLiked ? 1 : -1;
            callApi(_isLiked ? '/user/v2/like' : '/user/v2/unlike', {
              elementType: 'game_3',
              elementId: GAME.game_id,
            })
              .then(function () {
                reply(data.taskId, 'receive_social_action_result', {
                  action: action,
                  success: true,
                  isLiked: _isLiked,
                  likeCount: _likeCount,
                });
              })
              .catch(function () {
                _isLiked = !_isLiked;
                _likeCount += _isLiked ? 1 : -1;
                reply(data.taskId, 'receive_social_action_result', { action: action, success: false });
              });
            break;
          }
          if (action === 'comment') {
            var _giComment = buildGameInfoForCommentPanel();
            sendFlutterMessage({
              action: 'showCommentPanel',
              arguments: {
                type: 'game_3',
                id: GAME.game_id,
                commentCount: _commentCount,
                fromPage: 'feed',
                showShot: true,
                sekaiCreatorId: _giComment.creator_id,
                game: _giComment,
              },
            });
            reply(data.taskId, 'receive_social_action_result', { action: 'comment', success: true, commentCount: _commentCount });
            break;
          }
          if (action === 'remix') {
            var _giRemix = buildGameInfoForCommentPanel();
            sendFlutterMessage({
              action: 'showCommentPanel',
              arguments: {
                type: 'game_3',
                id: GAME.game_id,
                commentCount: _commentCount,
                fromPage: 'feed',
                showShot: true,
                remixId: GAME.game_id,
                tabIndex: 1,
                sekaiCreatorId: _giRemix.creator_id,
                game: _giRemix,
              },
            });
            reply(data.taskId, 'receive_social_action_result', { action: 'remix', success: true, commentCount: _commentCount });
            break;
          }
          reply(data.taskId, 'receive_social_action_result', null, 400, 'Unknown action: ' + action);
          break;
        }

        case 'create_app_private_session':
          mpHandleCreateAppPrivateSession(data.taskId, data.data);
          break;
        case 'get_app_private_sessions':
          mpHandleGetAppPrivateSessions(data.taskId);
          break;
        case 'join_app_private_session':
          mpHandleJoinAppPrivateSession(data.taskId, data.data);
          break;
        case 'multiplayer_get_session':
          mpHandleGetSession(data.taskId);
          break;
        case 'multiplayer_get_players':
          mpHandleGetPlayers(data.taskId);
          break;
        case 'multiplayer_send_data':
          mpHandleSendData(data.data);
          break;

        case 'deeplink_click': {
          var deeplinkData = data.data || {};
          sendFlutterMessage({
            action: 'logEvent',
            parameters: {
              eventName: 'deeplink_click',
              source: deeplinkData.source || 'native_feed',
              contentId: deeplinkData.contentId || deeplinkData.content_id || GAME.game_id || '',
              content_id: deeplinkData.content_id || deeplinkData.contentId || GAME.game_id || '',
              contentType: 'g3_game',
              fromPage: deeplinkData.fromPage || 'feed',
              is_multiplayer: deeplinkData.is_multiplayer == null ? true : deeplinkData.is_multiplayer,
              inviter_id: deeplinkData.inviter_id || deeplinkData.inviterId || '',
            },
          });
          break;
        }

        case 'gen_vibration':
          requestShellVibration(data.data);
          break;
        case 'upload_image': {
          var image = data.data && data.data.image;
          if (!image || typeof image !== 'string' || image.indexOf('data:image/') !== 0) {
            reply(
              data.taskId,
              'receive_upload_image',
              null,
              400,
              'Image must include data URL prefix (e.g., data:image/png;base64,...)'
            );
            break;
          }
          uploadBase64ToS3(image, 'image')
            .then(function (hostUrl) {
              reply(data.taskId, 'receive_upload_image', { hostUrl: hostUrl });
            })
            .catch(function (err) {
              reply(
                data.taskId,
                'receive_upload_image',
                null,
                500,
                (err && err.message) || 'Image upload failed'
              );
            });
          break;
        }
      }
    });

    function tryPageReady() {
      var hasFlutterHandler = typeof window.sendMessageToFlutter === 'function' ||
        (window.flutter_inappwebview && window.flutter_inappwebview.callHandler);
      if (!hasFlutterHandler) {
        _pageReadyRetries += 1;
        if (_pageReadyRetries < 20) setTimeout(tryPageReady, 300);
        return;
      }
      sendFlutterMessage({ action: 'pageReady', data: { creatorUserId: GAME.creator_user_id } });
    }

    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'hidden') {
        stopVibration();
      } else if (_isCardVisible) {
        resumeVibration();
      }
      syncAudioState('document_visibility_change');
    });
    window.addEventListener('resize', sendViewportHeight);

    (function init() {
      var iframe = iframeNode();
      if (!iframe) return;
      iframe.addEventListener('load', function () {
        if (!_iframeActive || !iframe.contentWindow) return;
        postBootstrapToFrame();
        syncAudioStateForce('iframe_load');
        sendViewportHeight();
      });
      tryPageReady();
    })();
  </script>
</body>

</html>
